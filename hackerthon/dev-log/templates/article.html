<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <title>Dev-Log | Articles</title>
    <script src="/static/article-data.js"></script>
    <style>
        /* 대시보드 공용 스타일 */
        body {
            background-color: #0F172A;
            margin: 0; padding: 20px;
            font-family: 'Pretendard', sans-serif;
            color: #1E293B;
        }
        .dashboard-container {
            display: grid;
            grid-template-areas: "header header" "sidebar main";
            grid-template-columns: 240px 1fr;
            grid-template-rows: auto 1fr;
            gap: 25px; max-width: 1300px; margin: 0 auto;
        }
        .header { grid-area: header; height: 135px; overflow: hidden; border-radius: 30px; }
        .header img { width: 100%; height: 100%; object-fit: cover; object-position: center 85%; cursor: pointer; }

        .sidebar {
            grid-area: sidebar; background-color: #ECF6F6; border-radius: 30px;
            padding: 40px 20px; display: flex; flex-direction: column; gap: 15px;
            position: sticky; top: 20px; align-self: start; font-family: 'Pixelify Sans', sans-serif;
        }
        .menu-item {
            width: 100%; padding: 15px 20px; border-radius: 15px; cursor: pointer;
            transition: 0.2s; color: #475569; font-weight: 600; text-decoration: none;
            box-sizing: border-box; display: flex; align-items: center;
        }
        .menu-item.active { background-color: #465052; color: white; font-weight: bold; }
        .menu-item:hover:not(.active) { background-color: #D1E9E9; }

        /* 아티클 전용 스타일 */
        .main-content { grid-area: main; display: flex; flex-direction: column; gap: 25px; }

        .article-header { display: flex; justify-content: space-between; align-items: flex-end; }
        .article-title { color: #FFFFFF; font-size: 2.5rem; font-weight: 800; margin: 0; font-family: 'Pixelify Sans', sans-serif; }
        
        /* 필터 및 검색바 */
        .top-controls { display: flex; justify-content: space-between; align-items: center; }
        .filter-group { display: flex; gap: 10px; }
        .filter-btn {
            padding: 8px 16px; border-radius: 12px; background: #1E293B;
            color: #94A3B8; font-size: 0.9rem; font-weight: 600; cursor: pointer;
        }
        .filter-btn.active { background: #6366F1; color: white; }

        /* 아티클 리스트 그리드 */
        .article-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        /* 아티클 카드 */
        .article-card {
            background-color: #ECF6F6; border-radius: 30px; overflow: hidden;
            transition: all 0.3s ease; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }
        .article-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }

        .article-icon {
            height: 140px; background: #D1E9E9;
            display: flex; justify-content: center; align-items: center; font-size: 3.5rem;
        }

        .article-body { padding: 30px; }
        .article-label { color: #6366F1; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .article-subject { font-size: 1.3rem; font-weight: 700; color: #1E293B; margin-bottom: 12px; line-height: 1.4; }
        .article-snippet { color: #475569; font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px; opacity: 0.8; }
        .article-info { font-size: 0.8rem; color: #94A3B8; display: flex; gap: 15px; }

        /* 모달 전체 배경 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        /* 모달 박스 */
        .modal-content {
            background-color: #ECF6F6;
            width: 90%; max-width: 700px;
            max-height: 80vh;
            border-radius: 40px;
            padding: 50px;
            position: relative;
            overflow-y: auto; /* 내용 길면 스크롤 */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* 닫기 버튼 */
        .modal-close {
            position: absolute;
            top: 25px; right: 30px;
            font-size: 2rem;
            cursor: pointer;
            color: #475569;
            transition: 0.3s;
        }
        .modal-close:hover { color: #ef4444; }

        /* 모달 내부 텍스트 스타일 */
        .modal-label { color: #6366F1; font-weight: 800; margin-bottom: 15px; display: block; }
        .modal-title { font-size: 2rem; font-weight: 800; color: #1E293B; margin-bottom: 25px; line-height: 1.3; }
        .modal-text { color: #334155; line-height: 1.8; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header class="header">
        <a href="/" style="display: block; width: 100%; height: 100%;">
            <img src="/static/header.png" alt="Dev-Log Banner">
        </a>
    </header>

    <aside class="sidebar">
        <a href="/" class="menu-item">Home</a>
        <a href="article" class="menu-item active">Article</a>
        <a href="mbti" class="menu-item">MBTI</a>
    </aside>

    <main class="main-content">
        <section class="article-header">
            <h1 class="article-title">Articles</h1>
        </section>

        <div class="top-controls">
            <div class="filter-group">
                <div class="filter-btn active">All</div>
                <div class="filter-btn">Frontend</div>
                <div class="filter-btn">Backend</div>
                <div class="filter-btn">Database</div>
            </div>
        </div>

        <div class="article-grid" id="article-list">
            </div>
    </main>
</div>

<div id="article-modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="closeModal(event)">&times;</span>
        <div id="modal-body">
            </div>
    </div>
</div>

<script>

    // 1. 초기 렌더링 및 필터 이벤트 설정
    window.onload = function() {
        // 처음에 전체 아티클 다 보여주기
        renderArticles(articles);
        
        // 필터 버튼들에 클릭 이벤트 달기
        setupFilters();
    };

    // 2. 아티클 렌더링 함수
    function renderArticles(data) {
        const list = document.getElementById('article-list');
        
        if (data.length === 0) {
            list.innerHTML = `<p style="color: #94A3B8; grid-column: 1/-1; text-align: center; padding: 50px;">해당 카테고리의 글이 아직 없습니다. 🦖</p>`;
            return;
        }

        list.innerHTML = data.map((art, index) => `
            <article class="article-card" onclick="openModal(${index})">
                <div class="article-icon">${art.emoji}</div>
                <div class="article-body">
                    <span class="article-label">${art.label}</span>
                    <h2 class="article-subject">${art.subject}</h2>
                    <p class="article-snippet">${art.snippet}</p>
                    <div class="article-info">${art.info}</div>
                </div>
            </article>
        `).join('');
    }

    // 3. 필터 버튼 작동 로직
    function setupFilters() {
        const filterBtns = document.querySelectorAll('.filter-btn');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                // (1) 모든 버튼에서 active 클래스 제거하고 클릭한 것만 추가
                filterBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                // (2) 클릭한 카테고리 이름 가져오기
                const category = this.innerText;

                // (3) 데이터 필터링
                if (category === "All") {
                    renderArticles(articles); // 전체 보기
                } else {
                    // 아티클의 label과 버튼의 텍스트가 일치하는 것만 걸러내기
                    const filtered = articles.filter(art => art.label === category);
                    renderArticles(filtered);
                }
            });
        });
    }

    // 4. 모달 열기 함수
    function openModal(index) {
        const art = articles[index];
        const modalBody = document.getElementById('modal-body');
        const modal = document.getElementById('article-modal');

        modalBody.innerHTML = `
            <span class="modal-label">${art.label}</span>
            <h1 class="modal-title">${art.subject}</h1>
            <div class="modal-text">
                <p>${art.content.replace(/\n/g, '<br>')}</p>
                <div style="margin-top: 40px; color: #94A3B8; font-size: 0.9rem;">
                    본 아티클의 저작권은 Dev-Log에게 있습니다. 🦖
                </div>
            </div>
        `;

        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    // 5. 모달 닫기 함수
    function closeModal(event) {
        const modal = document.getElementById('article-modal');
        modal.style.display = 'none';
        document.body.style.overflow = 'auto'; // 스크롤 복구
    }
</script>

</body>
</html>
