<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan It — To-do</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="todo-page-bg">

        <!-- ── Top Navigation Bar ── -->
        <header class="todo-topbar">
            <a href="/calendar" class="todo-topbar-logo">
                <div class="topbar-dot"></div>
                Plan It
            </a>
            <nav class="todo-topbar-nav">
                <a href="/calendar" class="topbar-btn accent">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8"  y1="2" x2="8"  y2="6"/>
                        <line x1="3"  y1="10" x2="21" y2="10"/>
                    </svg>
                    Calendar
                </a>
                <button class="topbar-btn" id="logout-btn">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Logout
                </button>
            </nav>
        </header>

        <!-- ── Main ── -->
        <div class="todo-page-container">

            <!-- Week Carousel -->
            <div class="carousel-wrapper">
                <div class="carousel-nav">
                    <button id="prev-week-btn" class="carousel-arrow">&#8249;</button>
                    <span id="carousel-month" class="carousel-month-label"></span>
                    <button id="next-week-btn" class="carousel-arrow">&#8250;</button>
                </div>
                <div id="week-days-container" class="week-days"></div>
                <input type="date" id="hidden-date-picker" style="display:none;">
            </div>

            <!-- Todo list -->
            <div class="todo-content-card">
                <div class="todo-header">
                    <span id="todo-date-heading" class="todo-date-heading"></span>
                    <button id="open-modal-btn" class="btn-add-todo">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        등록하기
                    </button>
                </div>

                <section class="todo-section">
                    <h4 class="section-header">Daily Routines</h4>
                    <div id="routine-list" class="todo-list-container"></div>
                </section>

                <section class="todo-section">
                    <h4 class="section-header">General Tasks</h4>
                    <div id="general-list" class="todo-list-container"></div>
                </section>
            </div>

        </div>
    </div>

    <!-- ── Modal ── -->
    <div id="todo-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3 id="modal-title">할 일 추가</h3>
            <form id="todo-form">
                <input type="hidden" id="edit-todo-id">
                <input type="text"   id="todo-title" placeholder="제목" required class="modal-input">
                <textarea id="todo-desc" placeholder="메모 (선택)" class="modal-textarea"></textarea>

                <div class="modal-row">
                    <select id="todo-priority" class="modal-input">
                        <option value="3">높음 🔥</option>
                        <option value="2" selected>보통 ✅</option>
                        <option value="1">낮음 💤</option>
                    </select>
                    <label class="routine-label">
                        <input type="checkbox" id="is-routine-check"> 루틴
                    </label>
                </div>

                <div id="routine-setup-box" class="routine-box" style="display:none;">
                    <select id="repeat-pattern" class="modal-input">
                        <option value="daily">매일</option>
                        <option value="weekday">평일</option>
                        <option value="weekend">주말</option>
                        <option value="weekly">매주 특정 요일</option>
                    </select>
                    <div id="day-picker" class="day-picker-container" style="display:none;"></div>
                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn-primary">등록</button>
                    <button type="button" id="close-modal-btn" class="btn-secondary">취소</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let allTodos    = [];
        let selectedDate = new Date().toISOString().split('T')[0];
        let selectedDays = [];

        const DAY_NAMES  = ['일','월','화','수','목','금','토'];
        const priorityMap = {
            3: { text: '높음', color: '#EF5350' },
            2: { text: '보통', color: '#FF8C42' },
            1: { text: '낮음', color: '#6B6A82' }
        };

        const getHeaders = () => ({
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
        });

        const formatDate = d => d.toISOString().split('T')[0];

        function getWeekStart(dateStr) {
            const d = new Date(dateStr);
            d.setDate(d.getDate() - d.getDay());
            return d;
        }

        /* ── Carousel ── */
        function renderWeekCarousel() {
            const weekStart = getWeekStart(selectedDate);
            const d = new Date(selectedDate);
            document.getElementById('carousel-month').textContent =
                `${d.getFullYear()}년 ${d.getMonth() + 1}월`;

            const container = document.getElementById('week-days-container');
            container.innerHTML = '';
            const todayStr = formatDate(new Date());

            for (let i = 0; i < 7; i++) {
                const day = new Date(weekStart);
                day.setDate(day.getDate() + i);
                const dateStr   = formatDate(day);
                const hasTodos  = allTodos.some(t => t.date === dateStr);

                const cell = document.createElement('div');
                let cls = 'day-cell';
                if (dateStr === selectedDate) cls += ' selected';
                if (dateStr === todayStr)     cls += ' today';
                if (i === 0) cls += ' sunday';
                if (i === 6) cls += ' saturday';
                cell.className = cls;

                cell.innerHTML = `
                    <span class="day-name">${DAY_NAMES[i]}</span>
                    <span class="day-num-carousel">${day.getDate()}</span>
                    ${hasTodos ? '<div class="day-dot"></div>' : '<div class="day-dot-spacer"></div>'}
                `;
                cell.addEventListener('click', () => {
                    selectedDate = dateStr;
                    renderWeekCarousel();
                    renderTodos();
                });
                container.appendChild(cell);
            }
        }

        function changeWeek(offset) {
            const d = new Date(selectedDate);
            d.setDate(d.getDate() + offset * 7);
            selectedDate = formatDate(d);
            renderWeekCarousel();
            renderTodos();
        }

        /* ── API ── */
        async function fetchTodos() {
            try {
                const res = await fetch('/api/todos', { headers: getHeaders() });
                if (!res.ok) throw new Error();
                allTodos = await res.json();
                renderWeekCarousel();
                renderTodos();
            } catch {
                if (localStorage.getItem('token')) alert('로그인 세션이 만료되었습니다.');
                window.location.href = '/login';
            }
        }

        async function saveTodo(e) {
            e.preventDefault();
            const id = document.getElementById('edit-todo-id').value;
            const data = {
                title:          document.getElementById('todo-title').value,
                description:    document.getElementById('todo-desc').value,
                priority:       Number(document.getElementById('todo-priority').value),
                is_routine:     document.getElementById('is-routine-check').checked ? 1 : 0,
                repeat_pattern: document.getElementById('repeat-pattern').value,
                repeat_day:     selectedDays.join(','),
                target_date:    selectedDate
            };
            const res = await fetch(id ? `/api/todos/${id}` : '/api/todos', {
                method:  id ? 'PUT' : 'POST',
                headers: getHeaders(),
                body:    JSON.stringify(data)
            });
            if (res.ok) { closeModal(); fetchTodos(); }
        }

        async function toggleComplete(id, cur) {
            await fetch(`/api/todos/${id}`, {
                method:  'PATCH',
                headers: getHeaders(),
                body:    JSON.stringify({ is_completed: cur === 1 ? 0 : 1 })
            });
            fetchTodos();
        }

        async function deleteTodo(id, isRoutine) {
            let url = `/api/todos/${id}`;
            if (isRoutine) {
                if (confirm('[확인]: 연결된 모든 루틴 삭제\n[취소]: 이 항목만 삭제')) url += '?type=all';
                else if (!confirm('이 항목 하나만 삭제하시겠습니까?')) return;
            } else {
                if (!confirm('정말 삭제하시겠습니까?')) return;
            }
            await fetch(url, { method: 'DELETE', headers: getHeaders() });
            fetchTodos();
        }

        /* ── Render ── */
        function renderTodos() {
            const d = new Date(selectedDate);
            document.getElementById('todo-date-heading').textContent =
                `${selectedDate}  (${DAY_NAMES[d.getDay()]})`;

            const routineList = document.getElementById('routine-list');
            const generalList = document.getElementById('general-list');
            routineList.innerHTML = '';
            generalList.innerHTML = '';

            const filtered = allTodos.filter(t => t.date === selectedDate);
            if (!filtered.length) {
                routineList.innerHTML = '<p class="empty-text">이날은 등록된 일정이 없어요</p>';
            }

            filtered.forEach(todo => {
                const item = document.createElement('div');
                item.className = 'todo-item';
                item.innerHTML = `
                    <input type="checkbox" ${todo.is_completed ? 'checked' : ''}
                        onchange="toggleComplete(${todo.id}, ${todo.is_completed})">
                    <div class="todo-info">
                        <div class="todo-title-row">
                            <span class="title ${todo.is_completed ? 'completed' : ''}">${todo.title}</span>
                            <span class="badge" style="color:${priorityMap[todo.priority].color}; border-color:${priorityMap[todo.priority].color}">
                                ${priorityMap[todo.priority].text}
                            </span>
                        </div>
                        ${todo.description ? `<p class="desc">${todo.description}</p>` : ''}
                    </div>
                    <div class="item-btns">
                        <button onclick='openEditModal(${JSON.stringify(todo)})'>수정</button>
                        <button class="del-btn" onclick="deleteTodo(${todo.id}, ${todo.is_routine === 1})">삭제</button>
                    </div>
                `;
                if (todo.is_routine === 1) routineList.appendChild(item);
                else generalList.appendChild(item);
            });
        }

        /* ── Modal ── */
        function openModal() {
            document.getElementById('modal-title').textContent = '할 일 추가';
            document.getElementById('todo-form').reset();
            document.getElementById('edit-todo-id').value = '';
            document.getElementById('routine-setup-box').style.display = 'none';
            document.getElementById('todo-modal').style.display = 'flex';
        }

        function openEditModal(todo) {
            document.getElementById('modal-title').textContent = '할 일 수정';
            document.getElementById('edit-todo-id').value = todo.id;
            document.getElementById('todo-title').value   = todo.title;
            document.getElementById('todo-desc').value    = todo.description || '';
            document.getElementById('todo-priority').value = todo.priority;
            document.getElementById('is-routine-check').checked = todo.is_routine === 1;
            if (todo.is_routine === 1) {
                document.getElementById('routine-setup-box').style.display = 'block';
                document.getElementById('repeat-pattern').value = todo.repeat_pattern || 'daily';
                selectedDays = todo.repeat_day ? todo.repeat_day.split(',').map(Number) : [];
                updateDayPickerUI();
            }
            document.getElementById('todo-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('todo-modal').style.display = 'none';
            selectedDays = [];
        }

        function updateDayPickerUI() {
            const container = document.getElementById('day-picker');
            container.innerHTML = '';
            DAY_NAMES.forEach((day, idx) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = day;
                btn.className = `day-btn ${selectedDays.includes(idx) ? 'active' : ''}`;
                btn.onclick = () => {
                    selectedDays = selectedDays.includes(idx)
                        ? selectedDays.filter(d => d !== idx)
                        : [...selectedDays, idx];
                    updateDayPickerUI();
                };
                container.appendChild(btn);
            });
            container.style.display =
                document.getElementById('repeat-pattern').value === 'weekly' ? 'flex' : 'none';
        }

        /* ── Init ── */
        window.onload = () => {
            const urlParams  = new URLSearchParams(window.location.search);
            const dateFromUrl = urlParams.get('date');
            if (dateFromUrl) selectedDate = dateFromUrl;

            if (!localStorage.getItem('token')) { window.location.href = '/login'; return; }

            fetchTodos();

            document.getElementById('prev-week-btn').onclick  = () => changeWeek(-1);
            document.getElementById('next-week-btn').onclick  = () => changeWeek(1);
            document.getElementById('open-modal-btn').onclick  = openModal;
            document.getElementById('close-modal-btn').onclick = closeModal;
            document.getElementById('todo-form').onsubmit     = saveTodo;

            document.getElementById('is-routine-check').onchange = e => {
                document.getElementById('routine-setup-box').style.display =
                    e.target.checked ? 'block' : 'none';
            };
            document.getElementById('repeat-pattern').onchange = updateDayPickerUI;

            document.getElementById('hidden-date-picker').onchange = e => {
                selectedDate = e.target.value;
                renderWeekCarousel();
                renderTodos();
            };

            document.getElementById('logout-btn').onclick = () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/login';
            };
        };
    </script>
</body>
</html>
